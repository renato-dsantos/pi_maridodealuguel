<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Serviço</title>
    <link rel="stylesheet" href="../estilos/solicitar_servico.css">
</head>
<body>
    <header>
        <a href="../index.html">
        <img src="../img/logo.png" alt="Logo do Site" class="logo" >
        </a>
    </header>
    <main>
        <h2>Solicitação de Serviço</h2> 
        <div class="container">
            <form id="formulario">
                <h2>Informações do Prestador:</h2>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required readonly>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required readonly>
                <label for="servico">Serviço:</label>
                <input type="text" id="servico" name="servico" required readonly>
                <h2>Descrição do Prestador:</h2>
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" rows="5" cols="30" required readonly></textarea>
                <hr>
                <h2>Informações de Serviço:</h2>
                <label for="tipo_servico">Tipo de Serviço:</label>
                <select id="tipo_servico" name="tipo_servico" required>
                    <option value="">Selecione...</option>
                    <option value="eletricista">Eletricista</option>
                    <option value="pedreiro">Pedreiro</option>                    
                    <option value="Encanador">Encanador</option>
                    <option value="Pintor">Pintor</option>
                    <option value="jardineiro">Jardineiro</option>
                    <option value="montador_moveis">Montador de Móveis</option>                    
                </select>
                <label for="data_servico">Data do Serviço:</label>
                <input type="date" id="data_servico" name="data_servico" required>
                <label for="descricao_servico">Descrição do Serviço:</label>
                <textarea id="descricao_servico" name="descricao_servico" rows="5" cols="30"></textarea>




                <div class="button-row">
                <button id="botaoSolicitarServico" type="submit">Solicitar Serviço</button>
                <button type="reset" id="botaoCancelar" onclick="window.location.href='../index.html';">Cancelar</button>
                </div>


            </form>
        </div>
    
        
    </main>
    <script src="../js/solicitar_servico.js"></script>
</body>
</html>
