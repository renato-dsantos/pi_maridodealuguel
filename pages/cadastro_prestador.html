<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Prestador de Serviço</title>
    <link rel="stylesheet" href="../estilos/cadastro.css">
</head>
<body>
    <header>
        <img src="../img/logo.png" alt="Logo do Site" class="logo">
    </header>
    <main>
        <h2>Cadastro Prestador de Serviço</h2> 
        <div class="container">
            <form id="formulario">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" >
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" >
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" >
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" >
                <label for="confirmar_senha">Confirmar Senha:</label>
                <input type="password" name="confirmar_senha" id="confirmar_senha" >
                <label for="servico">Serviço:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="eletricista" name="servico" value="eletricista"> Eletricista</label>               
                    <label><input type="checkbox" id="encanador" name="servico" value="encanador"> Encanador</label>
                    <label><input type="checkbox" id="jardineiro" name="servico" value="jardineiro"> Jardineiro</label>
                    <label><input type="checkbox" id="pedreiro" name="servico" value="pedreiro"> Pedreiro</label>
                    <label><input type="checkbox" id="pintor" name="servico" value="pintor"> Pintor</label>
                    <label><input type="checkbox" id="montador_moveis" name="servico" value="montador_moveis"> Montador de móveis</label>
                </div>   
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" rows="5" cols="30" placeholder="Digite uma descrição do Serviço..." require></textarea>
                <div class="button-row">
                <button id="botaoEnviar">Enviar</button>
                <button type="reset" id="botaoCancelar">Cancelar</button>
                </div>


            </form>
        </div>
    
        
    </main>
    <script src="../js/cadastro_prestador.js"></script>
</body>
</html>
